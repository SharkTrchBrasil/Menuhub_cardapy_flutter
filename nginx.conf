events {}
http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  gzip on;
  gzip_types text/plain application/javascript application/json text/css application/wasm;
  gzip_min_length 1000;
  gzip_comp_level 6;

  server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|wasm)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}