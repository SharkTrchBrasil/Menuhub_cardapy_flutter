<!DOCTYPE html>
<html>

<head>
  <!-- ✅ PERF: Preconnect to API domain — starts DNS+SSL+TCP in parallel with HTML parsing.
       Saves ~340ms on the CORS preflight (OPTIONS) that would otherwise open a cold connection. -->
  <link rel="preconnect" href="https://api.menuhub.com.br" crossorigin>
  <link rel="dns-prefetch" href="https://api.menuhub.com.br">
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- ✅ PREVIEW SOCIAL: Injeta meta tags dinamicamente via POST /auth/subdomain -->
  <script>
    (async function() {
      try {
        const hostname = window.location.hostname;
        // Skip meta tags on localhost, IPs (127.0.0.1, etc), and non-subdomain hosts
        if (!hostname || hostname === 'localhost' || /^\d+(\.\d+)*$/.test(hostname)) return;
        const slug = hostname.split('.')[0];
        if (!slug || slug === 'www' || slug === 'localhost') return;

        const apiUrl = window.location.hostname.includes('localhost') 
          ? 'http://localhost:8000'
          : 'https://api.menuhub.com.br';

        const res = await fetch(`${apiUrl}/app/auth/subdomain`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ store_url: slug, totem_token: '' })
        });

        if (!res.ok) return;
        const data = await res.json();
        
        // ✅ PERF: Salva resposta para Flutter reusar (evita chamada duplicada ~1000ms)
        window._menuhubAuthData = data;

        const name = data.store_name || 'Cardápio Digital';
        const desc = data.store_description || ('Veja o cardápio de ' + name + ' e faça seu pedido online!');
        const url = window.location.href;
        const image = data.logo_url || data.banner_url || '';

        document.title = name;

        const metas = [
          ['og:title', name],
          ['og:description', desc],
          ['og:url', url],
          ['og:type', 'website'],
          ['og:site_name', 'MenuHub'],
          ['twitter:card', 'summary_large_image'],
          ['twitter:title', name],
          ['twitter:description', desc],
        ];

        if (image) {
          metas.push(['og:image', image]);
          metas.push(['og:image:width', '1200']);
          metas.push(['og:image:height', '630']);
          metas.push(['twitter:image', image]);
        }

        metas.forEach(([prop, content]) => {
          const tag = document.createElement('meta');
          tag.setAttribute('property', prop);
          tag.setAttribute('content', content);
          document.head.appendChild(tag);
        });
      } catch(e) {
        console.error('Erro ao carregar meta tags:', e);
      }
    })();
  </script>

  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="TotemPRO - Soluções de autoatendimento.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="TotemPRO">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>TotemPRO</title>
  <link rel="manifest" href="manifest.json">

  <script>
    // ✅ PERF: Helper para Flutter ler auth pre-fetched via @JS interop
    function _getMenuhubAuth() {
      if (!window._menuhubAuthData) return null;
      var r = JSON.stringify(window._menuhubAuthData);
      delete window._menuhubAuthData;
      return r;
    }
  </script>

  <style>
    body {
      background-color: #ffffff;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    #loading {
      position: fixed;
      inset: 0;
      background: #fff;
      z-index: 10;
      transition: opacity 0.3s ease-out;
      display: flex;
      flex-direction: column;
    }

    /* ✅ Native shimmer skeleton — matches Flutter SkeletonShimmer layout */
    .shimmer-box {
      background: linear-gradient(90deg, #eee 25%, #f5f5f5 50%, #eee 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .shimmer-header { height: 200px; border-radius: 0; }
  </style>
</head>

<body>
  <div id="loading">
    <div style="position: relative; padding-bottom: 24px; overflow: hidden;">
      <div class="shimmer-box shimmer-header"></div>
      
      <!-- Circle Logo -->
      <div style="position: absolute; top: 110px; left: 50%; transform: translateX(-50%); width: 80px; height: 80px; border-radius: 50%; background: #fff; border: 4px solid #fff; z-index: 2; display: flex; justify-content: center; align-items: center;">
         <div class="shimmer-box" style="width: 100%; height: 100%; border-radius: 50%;"></div>
      </div>
      
      <!-- Info Card -->
      <div style="position: relative; margin: -50px 16px 0; background: #fff; border-radius: 24px; border: 1px solid #eee; padding: 45px 16px 12px; z-index: 1;">
         <div class="shimmer-box" style="width: 180px; height: 20px; border-radius: 4px; margin-bottom: 8px;"></div>
         <div class="shimmer-box" style="width: 120px; height: 12px; border-radius: 3px; margin-bottom: 16px;"></div>
         <div style="height: 1px; background: #eee; margin: 16px 0;"></div>
         <div style="display: flex; gap: 8px; margin: 12px 0;">
             <div class="shimmer-box" style="width: 18px; height: 18px; border-radius: 4px;"></div>
             <div class="shimmer-box" style="width: 100px; height: 14px; border-radius: 4px;"></div>
         </div>
         <div style="height: 1px; background: #eee; margin: 16px 0;"></div>
         <div class="shimmer-box" style="width: 200px; height: 14px; border-radius: 4px; margin-bottom: 6px;"></div>
         <div class="shimmer-box" style="width: 150px; height: 10px; border-radius: 3px;"></div>
      </div>
    </div>
    
    <div class="shimmer-box" style="width: 140px; height: 20px; border-radius: 4px; margin: 0 16px 16px;"></div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 16px;">
       <div style="display: flex; flex-direction: column; gap: 8px;">
           <div class="shimmer-box" style="aspect-ratio: 0.8; border-radius: 12px; width: 100%;"></div>
           <div class="shimmer-box" style="width: 100px; height: 12px; border-radius: 3px;"></div>
           <div class="shimmer-box" style="width: 60px; height: 14px; border-radius: 3px;"></div>
       </div>
       <div style="display: flex; flex-direction: column; gap: 8px;">
           <div class="shimmer-box" style="aspect-ratio: 0.8; border-radius: 12px; width: 100%;"></div>
           <div class="shimmer-box" style="width: 100px; height: 12px; border-radius: 3px;"></div>
           <div class="shimmer-box" style="width: 60px; height: 14px; border-radius: 3px;"></div>
       </div>
    </div>
  </div>

  <script src="flutter_bootstrap.js" async></script>

  <script>
    // ✅ Remove splash screen when Flutter is ready
    window.addEventListener('flutter_ready', function () {
      var loading = document.getElementById('loading');
      if (loading) {
        loading.style.opacity = '0';
        setTimeout(function () {
          loading.remove();
        }, 500);
      }
    });
  </script>
</body>

</html>
