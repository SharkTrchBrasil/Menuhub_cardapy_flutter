<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="TotemPRO - Soluções de autoatendimento para seu negócio.">
  <meta name="keywords" content="totem, autoatendimento, pedido, restaurante, lanchonete, delivery, pdv">
  <meta name="author" content="Sua Empresa/Nome do Desenvolvedor">

  <base href="$FLUTTER_BASE_HREF">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TotemPRO">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png" />
  <title>TotemPRO</title>
  <link rel="manifest" href="manifest.json">

  <!-- ✅ OTIMIZAÇÃO: Preconnect para recursos externos -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://www.gstatic.com">
  <link rel="preconnect" href="https://maps.googleapis.com">
  <link rel="preconnect" href="https://api.mapbox.com">

  <!-- ✅ OTIMIZAÇÃO: DNS Prefetch -->
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  <link rel="dns-prefetch" href="https://www.gstatic.com">
  <link rel="dns-prefetch" href="https://maps.googleapis.com">

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    #loading-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100vh;
      background-color: rgba(255, 255, 255, 0.9);
      position: absolute;
      top: 0;
      left: 0;
      z-index: 9999;
    }

    /* ✅ OTIMIZAÇÃO: Spinner CSS ao invés de GIF pesado */
    .spinner {
      width: 60px;
      height: 60px;
      border: 6px solid #f3f3f3;
      border-top: 6px solid #EA1D2C;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    #loading-text {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #333;
      margin-top: 20px;
      font-size: 16px;
      font-weight: 500;
    }

    .flutter-view {
      opacity: 0;
      transition: opacity 0.3s ease-in-out;
    }

    .flutter-view.show {
      opacity: 1;
    }
  </style>

</head>

<body>
  <!-- ✅ OTIMIZAÇÃO: Spinner CSS leve ao invés de GIF -->
  <div id="loading-container">
    <div class="spinner"></div>
    <p id="loading-text">Carregando...</p>
  </div>

  <div id="flutter_app_container"></div>

  <script>
    window.addEventListener('flutter_ready', function () {
      const loadingContainer = document.getElementById('loading-container');
      if (loadingContainer) loadingContainer.style.display = 'none';

      const flutterAppContainer = document.getElementById('flutter_app_container');
      if (flutterAppContainer) flutterAppContainer.classList.add('show');
    });

    // ✅ OTIMIZAÇÃO: Configuração otimizada do Flutter Web
    window.addEventListener('load', function () {
      _flutter_bootstrap.loadEntrypoint({
        onEntrypointLoaded: function (engineInitializer) {
          engineInitializer.initializeEngine({
            // ✅ CRÍTICO: Use CanvasKit apenas se necessário (melhor performance)
            renderer: "auto", // "auto", "canvaskit", ou "html"
            // ✅ OTIMIZAÇÃO: Desabilita service worker se não for PWA
            serviceWorker: {
              serviceWorkerVersion: null,
            }
          }).then(function (appRunner) {
            appRunner.runApp({
              targetElement: document.getElementById('flutter_app_container')
            });
          });
        }
      });
    });
  </script>

  <!-- ✅ OTIMIZAÇÃO: Carrega Firebase de forma assíncrona e lazy -->
  <script type="module">
    // Carrega Firebase apenas quando necessário
    const loadFirebase = async () => {
      try {
        const { initializeApp } = await import('https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js');
        const { getAnalytics } = await import('https://www.gstatic.com/firebasejs/11.9.1/firebase-analytics.js');

        const firebaseConfig = {
          apiKey: "AIzaSyAvI8rSa8mgZcg4IJAqJOgMIQEF7IwtDt8",
          authDomain: "pdvix-c69fe.firebaseapp.com",
          projectId: "pdvix-c69fe",
          storageBucket: "pdvix-c69fe.firebasestorage.app",
          messagingSenderId: "209909701330",
          appId: "1:209909701330:web:03ea9f309ce422c35e6b0b",
          measurementId: "G-R2QQ42E9T7"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        console.log('✅ Firebase inicializado');
      } catch (error) {
        console.error('❌ Erro ao carregar Firebase:', error);
      }
    };

    // ✅ OTIMIZAÇÃO: Carrega Firebase após 2 segundos (não bloqueia carregamento inicial)
    setTimeout(loadFirebase, 2000);
  </script>

  <!-- ✅ OTIMIZAÇÃO: Google Maps carrega apenas quando necessário -->
  <script>
    // Função global para carregar Google Maps sob demanda
    window.loadGoogleMaps = function () {
      if (window.google && window.google.maps) {
        return Promise.resolve();
      }

      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = 'https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&libraries=places&language=pt-BR';
        script.async = true;
        script.defer = true;
        script.onload = resolve;
        script.onerror = reject;
        document.head.appendChild(script);
      });
    };
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
