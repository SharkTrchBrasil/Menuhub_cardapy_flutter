<!DOCTYPE html>
<html>

<head>
  <!-- ✅ PREVIEW SOCIAL: Injeta meta tags dinamicamente via POST /auth/subdomain -->
  <script>
    (async function() {
      try {
        const slug = window.location.hostname.split('.')[0];
        if (!slug || slug === 'www' || slug === 'localhost') return;

        const apiUrl = window.location.hostname.includes('localhost') 
          ? 'http://localhost:8000'
          : 'https://api.menuhub.com.br';

        const res = await fetch(`${apiUrl}/app/auth/subdomain`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ store_url: slug, totem_token: '' })
        });

        if (!res.ok) return;
        const data = await res.json();
        
        const name = data.store_name || 'Cardápio Digital';
        const desc = data.store_description || ('Veja o cardápio de ' + name + ' e faça seu pedido online!');
        const url = window.location.href;
        const image = data.logo_url || data.banner_url || '';

        document.title = name;

        const metas = [
          ['og:title', name],
          ['og:description', desc],
          ['og:url', url],
          ['og:type', 'website'],
          ['og:site_name', 'MenuHub'],
          ['twitter:card', 'summary_large_image'],
          ['twitter:title', name],
          ['twitter:description', desc],
        ];

        if (image) {
          metas.push(['og:image', image]);
          metas.push(['og:image:width', '1200']);
          metas.push(['og:image:height', '630']);
          metas.push(['twitter:image', image]);
        }

        metas.forEach(([prop, content]) => {
          const tag = document.createElement('meta');
          tag.setAttribute('property', prop);
          tag.setAttribute('content', content);
          document.head.appendChild(tag);
        });
      } catch(e) {
        console.error('Erro ao carregar meta tags:', e);
      }
    })();
  </script>

  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="TotemPRO - Soluções de autoatendimento.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="TotemPRO">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>TotemPRO</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      background-color: #ffffff;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    .loading-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      background-color: white;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #f3f3f3;
      /* Trilha cinza */
      border-top: 4px solid #000000;
      /* Loading preto */
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .loading-text {
      display: none;
      /* Remove o texto para ficar minimalista como antes */
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div id="loading" class="loading-container">
    <div class="spinner"></div>
    <div class="loading-text">Carregando Totem Pro...</div>
  </div>

  <script src="flutter_bootstrap.js" async></script>

  <script>
    // ✅ Remove splash screen when Flutter is ready
    window.addEventListener('flutter_ready', function () {
      var loading = document.getElementById('loading');
      if (loading) {
        loading.style.opacity = '0';
        setTimeout(function () {
          loading.remove();
        }, 500);
      }
    });
  </script>
</body>

</html>
