<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="TotemPRO - Soluções de autoatendimento para seu negócio.">
  <meta name="keywords" content="totem, autoatendimento, pedido, restaurante, lanchonete, delivery, pdv">
  <meta name="author" content="MenuHub">

  <!-- ✅ SEO: Open Graph (Facebook, WhatsApp, LinkedIn) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="TotemPRO - Cardápio Digital">
  <meta property="og:description" content="Faça seu pedido online de forma rápida e prática.">
  <meta property="og:image" content="icons/Icon-512.png">

  <!-- ✅ SEO: Twitter Cards -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="TotemPRO - Cardápio Digital">
  <meta name="twitter:description" content="Faça seu pedido online de forma rápida e prática.">

  <!-- ✅ SEO: Tema e cores -->
  <meta name="theme-color" content="#EA1D2C">

  <base href="$FLUTTER_BASE_HREF">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TotemPRO">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png" />
  <title>TotemPRO</title>
  <link rel="manifest" href="manifest.json">

  <!-- ✅ OTIMIZAÇÃO: Preconnect para recursos externos -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://www.gstatic.com">
  <link rel="preconnect" href="https://maps.googleapis.com">
  <link rel="preconnect" href="https://api.mapbox.com">

  <!-- ✅ OTIMIZAÇÃO: DNS Prefetch -->
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  <link rel="dns-prefetch" href="https://www.gstatic.com">
  <link rel="dns-prefetch" href="https://maps.googleapis.com">

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    #loading-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100vh;
      background-color: #ffffff;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 9999;
      transition: opacity 0.3s ease-out;
      /* ✅ Transição suave */
      will-change: opacity;
      /* ✅ Otimização de performance */
    }

    /* ✅ OTIMIZAÇÃO: Spinner CSS ao invés de GIF pesado */
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #EA1D2C;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      will-change: transform;
      /* ✅ Otimização de performance */
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    #loading-text {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #666;
      margin-top: 20px;
      font-size: 14px;
      font-weight: 400;
    }

    .flutter-view {
      opacity: 0;
      transition: opacity 0.3s ease-in-out;
    }

    .flutter-view.show {
      opacity: 1;
    }
  </style>

</head>

<body>
  <!-- ✅ OTIMIZAÇÃO: Spinner CSS leve ao invés de GIF -->
  <div id="loading-container">
    <div class="spinner"></div>
    <p id="loading-text">Carregando...</p>
  </div>

  <div id="flutter_app_container"></div>

  <script>
    // ✅ OTIMIZAÇÃO: Remove splash assim que Flutter estiver pronto
    window.addEventListener('flutter_ready', function () {
      const loadingContainer = document.getElementById('loading-container');
      if (loadingContainer) {
        loadingContainer.style.opacity = '0';
        setTimeout(() => loadingContainer.style.display = 'none', 300);
      }

      const flutterAppContainer = document.getElementById('flutter_app_container');
      if (flutterAppContainer) flutterAppContainer.classList.add('show');
    });

    // ✅ CORREÇÃO CRÍTICA: Usa loader compatível com Flutter 3.7+
    // Aguarda o serviceWorker e flutter_bootstrap carregarem antes de inicializar
    window.addEventListener('load', async function () {
      // Aguarda o flutter_bootstrap estar disponível (máx 5s)
      let attempts = 0;
      while (typeof _flutter === 'undefined' && typeof _flutter_bootstrap === 'undefined' && attempts < 50) {
        await new Promise(r => setTimeout(r, 100));
        attempts++;
      }

      // ✅ Compatibilidade: Flutter 3.22+ usa _flutter, versões anteriores usam _flutter_bootstrap
      const loader = window._flutter?.loader || window._flutter_bootstrap;

      if (!loader) {
        console.error('❌ Flutter bootstrap não encontrado. Recarregando página...');
        // Fallback: recarrega a página após 2s
        setTimeout(() => window.location.reload(), 2000);
        return;
      }

      try {
        await loader.load({
          onEntrypointLoaded: async function (engineInitializer) {
            const appRunner = await engineInitializer.initializeEngine({
              // ✅ PERFORMANCE: html renderer carrega 30-50% mais rápido
              // Use "canvaskit" para gráficos complexos ou "auto" para decidir
              renderer: "html",
            });
            await appRunner.runApp();
          }
        });
      } catch (e) {
        console.error('❌ Erro ao inicializar Flutter:', e);
      }
    });
  </script>

  <!-- ✅ OTIMIZAÇÃO: Firebase removido do index.html -->
  <!-- O Firebase é inicializado diretamente no Dart (main.dart) através do firebase_core package -->
  <!-- Isso evita duplicação de ~13 KiB de JavaScript e melhora o tempo de carregamento inicial -->

  <!-- ✅ OTIMIZAÇÃO: Google Maps carrega apenas quando necessário -->
  <script>
    // Função global para carregar Google Maps sob demanda
    window.loadGoogleMaps = function () {
      if (window.google && window.google.maps) {
        return Promise.resolve();
      }

      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = 'https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&libraries=places&language=pt-BR';
        script.async = true;
        script.defer = true;
        script.onload = resolve;
        script.onerror = reject;
        document.head.appendChild(script);
      });
    };
  </script>

  <!-- ✅ SEGURANÇA: Bloqueio de Inspecionar Elemento e Atalhos -->
  <script>
    document.addEventListener('contextmenu', event => event.preventDefault());

    document.onkeydown = function (e) {
      // F12
      if (e.keyCode == 123) {
        return false;
      }
      // Ctrl+Shift+I (Inspect)
      if (e.ctrlKey && e.shiftKey && e.keyCode == 73) {
        return false;
      }
      // Ctrl+Shift+J (Console)
      if (e.ctrlKey && e.shiftKey && e.keyCode == 74) {
        return false;
      }
      // Ctrl+Shift+C (Inspect Element)
      if (e.ctrlKey && e.shiftKey && e.keyCode == 67) {
        return false;
      }
      // Ctrl+U (View Source)
      if (e.ctrlKey && e.keyCode == 85) {
        return false;
      }
    };
  </script>

  <script src="flutter_bootstrap.js" defer></script>
</body>

</html>
