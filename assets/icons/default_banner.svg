<svg viewBox="0 0 1600 300" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bagGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#d4a574;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#c49563;stop-opacity:1" />
        </linearGradient>
        <filter id="shadow">
            <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
        </filter>
    </defs>

    <!-- Background -->
    <rect width="1600" height="300" fill="#ffffff"/>

    <!-- Pizza slice (left) -->
    <g transform="translate(120, 150)">
        <path d="M 0,0 L 60,-50 A 60 60 0 0 1 60,50 Z" fill="#f4c430" filter="url(#shadow)"/>
        <circle cx="20" cy="-20" r="6" fill="#c41e3a"/>
        <circle cx="35" cy="0" r="5" fill="#c41e3a"/>
        <circle cx="25" cy="20" r="6" fill="#c41e3a"/>
        <ellipse cx="40" cy="-10" rx="8" ry="6" fill="#90ee90"/>
        <ellipse cx="45" cy="15" rx="7" ry="5" fill="#90ee90"/>
        <path d="M 0,0 L 60,-50 A 60 60 0 0 1 60,50 Z" fill="none" stroke="#d4a017" stroke-width="3"/>
    </g>

    <!-- Taco -->
    <g transform="translate(300, 140)">
        <ellipse cx="0" cy="40" rx="55" ry="15" fill="#8b7355" opacity="0.2"/>
        <path d="M -50,30 Q -50,10 -40,0 L 40,0 Q 50,10 50,30 Z" fill="#f4a460" filter="url(#shadow)"/>
        <path d="M -45,25 Q -45,15 -38,8 L 38,8 Q 45,15 45,25 Z" fill="#90ee90"/>
        <rect x="-35" y="15" width="70" height="8" fill="#a0522d" rx="2"/>
        <rect x="-30" y="12" width="60" height="4" fill="#ff6347"/>
        <circle cx="-15" cy="20" r="3" fill="#fff44f"/>
        <circle cx="10" cy="18" r="3" fill="#fff44f"/>
    </g>

    <!-- Sushi rolls -->
    <g transform="translate(520, 140)">
        <rect x="-60" y="-35" width="120" height="70" rx="8" fill="#2c2c2c" filter="url(#shadow)"/>
        <g transform="translate(-25, 0)">
            <circle cx="0" cy="0" r="22" fill="#ffffff"/>
            <circle cx="0" cy="0" r="18" fill="#1a1a1a"/>
            <circle cx="0" cy="0" r="12" fill="#ff6b35"/>
            <rect x="-2" y="-8" width="4" height="16" fill="#90ee90"/>
        </g>
        <g transform="translate(25, 0)">
            <circle cx="0" cy="0" r="22" fill="#ffffff"/>
            <circle cx="0" cy="0" r="18" fill="#1a1a1a"/>
            <circle cx="0" cy="0" r="12" fill="#ff8c42"/>
            <rect x="-6" y="-2" width="12" height="4" fill="#98d8c8"/>
        </g>
    </g>

    <!-- Bowl of pasta -->
    <g transform="translate(750, 180)">
        <ellipse cx="0" cy="20" rx="45" ry="12" fill="#cd853f" opacity="0.3"/>
        <ellipse cx="0" cy="0" rx="50" ry="18" fill="#e6e6fa" filter="url(#shadow)"/>
        <path d="M -45,-5 Q -45,-15 -35,-18 L 35,-18 Q 45,-15 45,-5 Z" fill="#f5f5f5"/>
        <circle cx="-15" cy="-10" r="8" fill="#ffd700"/>
        <circle cx="10" cy="-12" r="7" fill="#ffd700"/>
        <circle cx="-5" cy="-8" r="6" fill="#ffd700"/>
        <circle cx="20" cy="-8" r="7" fill="#ffd700"/>
        <path d="M -20,-8 Q -10,-15 0,-8" stroke="#ff6347" stroke-width="2" fill="none"/>
        <path d="M 5,-10 Q 15,-18 25,-10" stroke="#ff6347" stroke-width="2" fill="none"/>
        <circle cx="-8" cy="-6" r="2" fill="#228b22"/>
        <circle cx="15" cy="-5" r="2" fill="#228b22"/>
    </g>

    <!-- Shopping bag with Menuhub logo -->
    <g transform="translate(1000, 150)">
        <rect x="-50" y="-60" width="100" height="120" rx="4" fill="url(#bagGradient)" filter="url(#shadow)"/>
        <rect x="-45" y="-55" width="90" height="110" rx="3" fill="#e8d4b8"/>
        <path d="M -25,-60 Q -25,-75 0,-75 Q 25,-75 25,-60" stroke="#c49563" stroke-width="3" fill="none"/>

        <!-- Menuhub text -->
        <text x="0" y="-10" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ff4444" text-anchor="middle">menuhub</text>

        <!-- Fork and knife icon -->
        <g transform="translate(0, 15)">
            <rect x="-12" y="0" width="3" height="25" fill="#ff4444" rx="1"/>
            <circle cx="-10.5" cy="-2" r="2" fill="#ff4444"/>
            <circle cx="-10.5" cy="-7" r="2" fill="#ff4444"/>
            <circle cx="-10.5" cy="-12" r="2" fill="#ff4444"/>

            <rect x="9" y="0" width="3" height="25" fill="#ff4444" rx="1"/>
            <path d="M 5,-8 L 5,-12 L 15,-12 L 15,-8 Q 10,-5 5,-8" fill="#ff4444"/>
        </g>
    </g>

    <!-- Hot dog -->
    <g transform="translate(1200, 150)">
        <ellipse cx="0" cy="35" rx="60" ry="12" fill="#8b6914" opacity="0.2"/>
        <ellipse cx="0" cy="0" rx="65" ry="22" fill="#daa520" filter="url(#shadow)"/>
        <ellipse cx="0" cy="-2" rx="60" ry="18" fill="#f4a460"/>
        <ellipse cx="0" cy="0" rx="50" ry="12" fill="#8b4513"/>
        <path d="M -40,2 Q -20,8 0,8 Q 20,8 40,2" stroke="#ff0000" stroke-width="4" fill="none" stroke-linecap="round"/>
        <path d="M -35,6 Q -15,0 5,0 Q 25,0 35,6" stroke="#ffd700" stroke-width="3" fill="none" stroke-linecap="round"/>
    </g>

    <!-- Drink cup -->
    <g transform="translate(1400, 150)">
        <ellipse cx="0" cy="40" rx="25" ry="8" fill="#ff6b6b" opacity="0.2"/>
        <path d="M -20,-40 L -25,35 Q -25,45 0,45 Q 25,45 25,35 L 20,-40 Z" fill="#ff6b6b" filter="url(#shadow)"/>
        <ellipse cx="0" cy="-40" rx="20" ry="8" fill="#ff8787"/>
        <rect x="-22" y="-10" width="44" height="35" fill="#ff4757" opacity="0.3"/>
        <rect x="-2" y="-50" width="4" height="15" fill="#ff6b6b" rx="2"/>
        <circle cx="0" cy="-8" r="4" fill="#ffffff" opacity="0.6"/>
        <circle cx="-8" cy="5" r="3" fill="#ffffff" opacity="0.6"/>
        <circle cx="10" cy="0" r="3" fill="#ffffff" opacity="0.6"/>
    </g>

    <!-- Coffee cup -->
    <g transform="translate(1550, 160)">
        <ellipse cx="0" cy="25" rx="20" ry="6" fill="#8b4513" opacity="0.2"/>
        <ellipse cx="0" cy="-20" rx="25" ry="10" fill="#6f4e37" filter="url(#shadow)"/>
        <path d="M -25,-20 L -22,15 Q -22,22 0,22 Q 22,22 22,15 L 25,-20 Z" fill="#8b6f47" filter="url(#shadow)"/>
        <ellipse cx="0" cy="-20" rx="22" ry="8" fill="#4a3728"/>
        <path d="M 25,-10 Q 35,-10 35,0 Q 35,10 25,10" stroke="#8b6f47" stroke-width="3" fill="none"/>
        <path d="M -8,-15 Q -5,-20 0,-15 Q 5,-20 8,-15" stroke="#d2691e" stroke-width="1.5" fill="none" opacity="0.6"/>
    </g>

    <!-- Decorative elements -->
    <circle cx="250" cy="80" r="8" fill="#ffd700" opacity="0.6"/>
    <circle cx="900" cy="250" r="6" fill="#ff6b6b" opacity="0.5"/>
    <circle cx="650" cy="60" r="7" fill="#90ee90" opacity="0.5"/>
    <circle cx="1150" cy="80" r="5" fill="#ffd700" opacity="0.6"/>
</svg>