# ✅ ADIÇÕES PARA PUBSPEC.YAML - SENTRY/CRASHLYTICS INTEGRATION
# 
# Adicione estas dependências ao seu pubspec.yaml

dependencies:
  # ✅ Sentry para error tracking e performance monitoring
  sentry_flutter: ^7.10.0
  
  # ✅ Firebase Crashlytics para crash reporting
  firebase_crashlytics: ^3.4.9
  
  # ✅ Firebase Analytics para eventos de negócio
  firebase_analytics: ^10.7.0
  
  # ✅ Firebase Core (necessário para Crashlytics e Analytics)
  firebase_core: ^2.24.2

dev_dependencies:
  # ✅ Sentry para desenvolvimento
  sentry_dart: ^7.10.0

# ═══════════════════════════════════════════════════════════════════════════════
# 🔥 INSTRUÇÕES DE INSTALAÇÃO
# ═══════════════════════════════════════════════════════════════════════════════

# 1. Execute flutter pub get
# flutter pub get

# 2. Configure o Firebase (se ainda não configurado)
# - Adicione o google-services.json (Android)
# - Adicione o GoogleService-Info.plist (iOS)
# - Siga o guia: https://firebase.google.com/docs/flutter/setup

# 3. Configure o Sentry
# - Crie um projeto em https://sentry.io
# - Obtenha seu DSN (Data Source Name)
# - Configure no AppLogger.initialize()

# 4. Adicione ao seu main.dart:
# import 'package:totem_pro_admin/core/utils/app_logger.dart';
# 
# void main() async {
#   await AppLogger.initialize(
#     dsn: 'YOUR_SENTRY_DSN',
#     environment: kDebugMode ? 'development' : 'production',
#   );
#   
#   runApp(MyApp());
# }

